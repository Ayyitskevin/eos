# Reverse proxy for Eos — place in /etc/nginx/sites-available/eos
# Replace eos.example.com with your hostname; certbot --nginx -d eos.example.com

upstream eos_app {
    server 127.0.0.1:8410;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;
    server_name eos.example.com;

    client_max_body_size 64m;

    location / {
        proxy_pass http://eos_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
    }
}