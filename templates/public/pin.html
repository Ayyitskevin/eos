{% extends "base.html" %}
{% block title %}{{ g.title }} · {{ site_name }}{% endblock %}
{% block content %}
<main class="center-card">
  <p class="brand-mark">Eos</p>
  <h1>{{ g.title }}</h1>
  {% if g.client_name %}<p class="muted">for {{ g.client_name }}</p>{% endif %}
  <form method="post" action="/g/{{ g.slug }}/pin" class="pin-form">
    <input type="text" name="pin" inputmode="numeric" pattern="[0-9]{4}" maxlength="4"
           placeholder="4-digit PIN" autofocus required>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <button type="submit">View gallery</button>
  </form>
</main>
{% endblock %}
