{% extends "base.html" %}
{% block title %}New listing · {{ site_name }}{% endblock %}
{% block content %}
<main class="admin-main narrow">
  <header class="admin-bar">
    <h1>New listing</h1>
    <nav><a href="/admin">← Pipeline</a></nav>
  </header>

  <form method="post" action="/admin/listings" class="form-grid">
    <fieldset>
      <legend>Property</legend>
      <label>Title <input name="title" required placeholder="123 Oak St — Smith listing"></label>
      <label>Address <input name="address_line1" placeholder="123 Oak Street"></label>
      <label>Unit / suite <input name="address_line2"></label>
      <div class="row-3">
        <label>City <input name="city"></label>
        <label>State <input name="state" maxlength="2" placeholder="TX"></label>
        <label>ZIP <input name="zip_code"></label>
      </div>
      <label>MLS ID <input name="mls_id" placeholder="MLS#"></label>
      <label>Type
        <select name="property_type">
          {% for pt in property_types %}
          <option value="{{ pt }}">{{ property_type_labels[pt] }}</option>
          {% endfor %}
        </select>
      </label>
      <div class="row-3">
        <label>Beds <input name="beds" type="number" step="0.5" min="0"></label>
        <label>Baths <input name="baths" type="number" step="0.5" min="0"></label>
        <label>Sq ft <input name="sqft" type="number" min="0"></label>
      </div>
    </fieldset>

    <fieldset>
      <legend>Client & schedule</legend>
      <label>Client
        <select name="client_id">
          <option value="">— none —</option>
          {% for c in client_list %}
          <option value="{{ c.id }}" {% if preselect_client_id == c.id %}selected{% endif %}>{{ c.name }}{% if c.company %} · {{ c.company }}{% endif %}</option>
          {% endfor %}
        </select>
      </label>
      <label>Shoot date <input name="shoot_date" type="date"></label>
      <label>Delivery due <input name="due_at" type="datetime-local"></label>
      <label>Access notes <textarea name="access_notes" rows="2" placeholder="Lockbox code, gate, agent on-site…"></textarea></label>
      <label>Notes <textarea name="notes" rows="2"></textarea></label>
    </fieldset>

    <p class="muted">A default RE shot list and delivery checklist will be seeded automatically.</p>
    <button type="submit" class="btn btn-accent">Create listing</button>
  </form>
</main>
{% endblock %}
