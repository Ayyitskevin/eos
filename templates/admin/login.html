{% extends "base.html" %}
{% block title %}Admin · {{ site_name }}{% endblock %}
{% block content %}
<main class="center-card">
  <p class="brand-mark">Eos</p>
  <h1>Studio admin</h1>
  <p class="muted">Real estate photography pipeline</p>
  <form method="post" action="/admin/login" class="pin-form">
    {% if saas_mode %}
    <input type="email" name="email" placeholder="Email" autocomplete="username" required>
    {% endif %}
    <input type="password" name="password" placeholder="Password" {% if not saas_mode %}autofocus{% endif %} autocomplete="current-password" required>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <button type="submit">Sign in</button>
  </form>
</main>
{% endblock %}
